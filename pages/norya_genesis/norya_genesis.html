        <h1>Norya Genesis</h1>

        <h2>關於</h2>
        <p>Norya Genesis的遊戲概念是多年前就已經有，最初還有用XNA開發，但是後來轉移到Unity。因為工作的關係，開發的時間有限，加上3D美術的離開，也拖了好幾年，直到AI建模的興起，如Tripo AI，但是臉部的處理還是不如想像的好。現在準備從地圖編輯器著手，改善編輯的功能，並與遊戲整合，加入對話編輯器，整合成劇情編輯器，可以編輯劇情相關的設定，如對話的顯示、鏡頭運鏡、動畫的演出、音樂的改變、人物圖像的改變、背景與劇情的搭配。</p>
